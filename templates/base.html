<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Marks Scanner{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="scanlines"></div>
    <div class="wrap">
        <header class="topbar">
            <div class="topbar-brand">
                <span class="brand-mark">◈</span>
                <span class="brand-text">MARKS<span class="accent">SCANNER</span></span>
            </div>
            <nav class="topnav">
                <a href="{{ url_for('index') }}">New Scan</a>
                <a href="{{ url_for('history') }}">Records</a>
            </nav>
        </header>

        {% block content %}{% endblock %}

        <footer class="footer">
            <span>SYSTEM READY</span>
            <span class="dot">●</span>
            <span>STUDENT EVALUATION UNIT</span>
        </footer>
    </div>
</body>
</html>
